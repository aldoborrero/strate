server:
  port: 3030
  base_url: https://digger-ai.example.com
ai:
  enabled: true
  summary:
    enabled: true
    endpoint: https://ai-summary.example.com
    api_token: summary-token
    max_length: 1000
    timeout: 60s
  generation:
    enabled: true
    endpoint: https://ai-generation.example.com
    api_token: generation-token
    max_tokens: 2000
    temperature: 0.5
    timeout: 120s
auth:
  jwt_secret: test-secret
